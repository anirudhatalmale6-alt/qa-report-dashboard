<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORS - QA Automation Reports</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: #0f1117;
    color: #e1e4e8;
    display: flex;
    min-height: 100vh;
  }

  /* ==================== SIDEBAR ==================== */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: #161b22;
    border-right: 1px solid #21262d;
    height: 100vh;
    position: fixed;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 16px 16px 14px;
    border-bottom: 1px solid #21262d;
  }

  .sidebar-header h1 {
    font-size: 14px;
    font-weight: 600;
    color: #58a6ff;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-header h1 .icon {
    width: 26px;
    height: 26px;
    background: linear-gradient(135deg, #58a6ff, #3fb950);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #484f58;
    padding: 16px 16px 6px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    color: #c9d1d9;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    position: relative;
  }
  .nav-item:hover { background: #1c2129; color: #f0f6fc; }
  .nav-item.active {
    background: #1c2129;
    color: #58a6ff;
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 4px;
    bottom: 4px;
    width: 3px;
    background: #58a6ff;
    border-radius: 0 2px 2px 0;
  }
  .nav-item .nav-icon {
    width: 18px;
    text-align: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .sidebar-footer {
    margin-top: auto;
    border-top: 1px solid #21262d;
    padding: 12px 16px;
  }
  .sidebar-footer a {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #8b949e;
    font-size: 12px;
    text-decoration: none;
    padding: 6px 0;
  }
  .sidebar-footer a:hover { color: #c9d1d9; }

  /* ==================== MAIN ==================== */
  .main {
    margin-left: 220px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ==================== TOP FILTER BAR ==================== */
  .filter-bar {
    height: 52px;
    background: #161b22;
    border-bottom: 1px solid #21262d;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
  }

  .filter-bar .page-title {
    font-size: 15px;
    font-weight: 600;
    color: #f0f6fc;
    margin-right: auto;
  }

  .filter-select {
    padding: 6px 10px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #c9d1d9;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }
  .filter-select:focus { border-color: #58a6ff; }
  .filter-select option { background: #0d1117; }

  .filter-label {
    font-size: 11px;
    color: #8b949e;
    font-weight: 500;
  }

  /* ==================== CONTENT ==================== */
  .content {
    padding: 20px;
    flex: 1;
    overflow-y: auto;
  }

  /* ==================== SUMMARY STATS BAR ==================== */
  .stats-bar {
    display: flex;
    gap: 1px;
    background: #21262d;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .stat-item {
    flex: 1;
    background: #161b22;
    padding: 14px 16px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .stat-item:hover { background: #1c2129; }
  .stat-item .stat-value {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .stat-item .stat-label {
    font-size: 10px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .stat-item .stat-chevron {
    font-size: 9px;
    color: #484f58;
    margin-left: 4px;
  }
  .color-blue { color: #58a6ff; }
  .color-green { color: #3fb950; }
  .color-red { color: #f85149; }
  .color-orange { color: #d29922; }
  .color-gray { color: #8b949e; }
  .color-purple { color: #d2a8ff; }

  /* ==================== CHARTS ROW ==================== */
  .charts-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  .chart-card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    padding: 16px;
  }
  .chart-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .chart-card-title {
    font-size: 13px;
    font-weight: 600;
    color: #c9d1d9;
  }
  .chart-link {
    font-size: 11px;
    color: #58a6ff;
    cursor: pointer;
    text-decoration: none;
  }
  .chart-link:hover { text-decoration: underline; }
  .chart-container { position: relative; height: 220px; }
  .donut-container { position: relative; height: 220px; display: flex; align-items: center; justify-content: center; }

  /* ==================== DATA TABLES ==================== */
  .tables-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  .table-card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    overflow: hidden;
  }
  .table-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid #21262d;
  }
  .table-card-title {
    font-size: 13px;
    font-weight: 600;
    color: #c9d1d9;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .table-card-title .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-red { background: #f85149; }
  .dot-orange { background: #d29922; }
  .dot-green { background: #3fb950; }
  .dot-blue { background: #58a6ff; }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .data-table th {
    background: #1c2129;
    color: #8b949e;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 12px;
    text-align: left;
    white-space: nowrap;
  }
  .data-table td {
    padding: 8px 12px;
    border-bottom: 1px solid #21262d;
    color: #c9d1d9;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .data-table tr:hover td { background: #1c212980; }
  .data-table .num-col { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }

  .system-badge {
    display: inline-block;
    padding: 2px 6px;
    background: #21262d;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .badge-ess { color: #58a6ff; }
  .badge-clt { color: #d2a8ff; }
  .badge-wss { color: #3fb950; }

  /* ==================== RECENT RUNS TABLE ==================== */
  .runs-card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .runs-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid #21262d;
  }
  .runs-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .runs-table th {
    background: #1c2129;
    color: #8b949e;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 12px;
    text-align: left;
    white-space: nowrap;
    position: sticky;
    top: 0;
    cursor: pointer;
  }
  .runs-table th:hover { color: #c9d1d9; }
  .runs-table td {
    padding: 8px 12px;
    border-bottom: 1px solid #21262d;
    color: #c9d1d9;
  }
  .runs-table tr:hover td { background: #1c212980; cursor: pointer; }
  .runs-table-wrap { max-height: 400px; overflow-y: auto; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px;
  }
  .status-dot.passed { background: #3fb950; }
  .status-dot.failed { background: #f85149; }

  .progress-mini {
    width: 80px; height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; display: inline-flex;
  }
  .progress-mini .bar-p { background: #3fb950; height: 100%; }
  .progress-mini .bar-f { background: #f85149; height: 100%; }
  .progress-mini .bar-b { background: #d29922; height: 100%; }

  .btn-sm {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid #30363d;
    border-radius: 4px;
    color: #58a6ff;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-sm:hover { background: #58a6ff15; border-color: #58a6ff40; }
  .btn-sm.btn-orange { color: #d29922; }
  .btn-sm.btn-orange:hover { background: #d2992215; border-color: #d2992240; }

  /* ==================== INLINE REPORT PANEL ==================== */
  .inline-panel {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
    display: none;
  }
  .inline-panel.active { display: block; }
  .inline-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid #21262d;
    background: #1c2129;
  }
  .inline-panel-title { font-size: 13px; font-weight: 600; color: #f0f6fc; }
  .inline-panel-actions { display: flex; gap: 8px; align-items: center; }
  .btn-close-panel {
    background: none; border: none; color: #8b949e; font-size: 18px;
    cursor: pointer; padding: 2px 6px; border-radius: 4px;
  }
  .btn-close-panel:hover { background: #21262d; color: #f0f6fc; }
  .inline-iframe { width: 100%; height: 600px; border: none; background: #fff; }

  /* ==================== INLINE RESULTS TABLE ==================== */
  .results-panel {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
    display: none;
  }
  .results-panel.active { display: block; }
  .results-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid #21262d;
    flex-wrap: wrap;
  }
  .results-search {
    flex: 1;
    min-width: 180px;
    padding: 6px 10px;
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 6px;
    color: #e1e4e8;
    font-size: 12px;
    outline: none;
  }
  .results-search:focus { border-color: #58a6ff; }
  .results-search::placeholder { color: #484f58; }
  .results-filter {
    padding: 6px 10px;
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 6px;
    color: #e1e4e8;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }
  .results-count { font-size: 11px; color: #8b949e; padding: 6px 16px; border-bottom: 1px solid #21262d; }
  .results-table-wrap { overflow: auto; max-height: 400px; }
  .results-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  .results-table th {
    position: sticky; top: 0; background: #1c2129; color: #8b949e;
    font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 8px 12px; text-align: left; white-space: nowrap; cursor: pointer;
  }
  .results-table th:hover { color: #c9d1d9; }
  .results-table td {
    padding: 7px 12px; border-bottom: 1px solid #21262d; color: #c9d1d9;
    max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .results-table tr:hover td { background: #1c2129; }
  .status-passed { color: #3fb950; font-weight: 600; }
  .status-failed { color: #f85149; font-weight: 600; }
  .status-broken { color: #d29922; font-weight: 600; }
  .status-notrun { color: #484f58; font-weight: 600; }

  /* ==================== ENVIRONMENT DATES ==================== */
  .env-dates-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .env-dates-table th { background: #4472C4; color: #fff; padding: 8px 12px; text-align: center; border: 1px solid #30363d; font-weight: 600; font-size: 11px; }
  .env-dates-table td { padding: 6px 10px; border: 1px solid #30363d; text-align: center; font-size: 12px; }
  .env-dates-table tr:hover { background: #1c2129; }
  .env-name { font-weight: 600; text-align: left !important; color: #f0f6fc; }
  .env-assignment { text-align: left !important; color: #8b949e; font-size: 11px; }
  .env-date-ok { color: #3fb950; font-weight: 600; }
  .env-date-bad { color: #f85149; font-weight: 600; }
  .env-status-ok { color: #3fb950; font-weight: 600; }
  .env-status-down { color: #f85149; font-weight: 600; }
  .env-status-warn { color: #d29922; font-weight: 600; }
  .status-empty { color: #484f58; }
  .env-date-selector { background: #21262d; color: #e1e4e8; border: 1px solid #30363d; padding: 6px 10px; border-radius: 6px; font-size: 12px; }

  /* ==================== TOOL SECTION ==================== */
  .tool-info-banner {
    background: linear-gradient(135deg, #d2a8ff10, #58a6ff10);
    border: 1px solid #d2a8ff30;
    border-radius: 10px;
    padding: 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .tool-info-icon { font-size: 28px; flex-shrink: 0; }
  .tool-info-text h3 { font-size: 14px; color: #d2a8ff; margin-bottom: 4px; font-weight: 600; }
  .tool-info-text p { font-size: 12px; color: #8b949e; line-height: 1.5; }
  .medicare-tabs {
    display: flex; gap: 4px; margin-bottom: 12px; background: #161b22;
    padding: 3px; border-radius: 6px; border: 1px solid #21262d; flex-wrap: wrap;
  }
  .med-tab {
    padding: 6px 14px; border: none; background: transparent; color: #8b949e;
    font-size: 12px; cursor: pointer; border-radius: 4px; transition: all 0.15s; font-weight: 500;
  }
  .med-tab:hover { color: #c9d1d9; background: #21262d; }
  .med-tab.active { background: #d2a8ff20; color: #d2a8ff; font-weight: 600; }
  .premium-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .premium-table th {
    background: #1c2129; color: #8b949e; font-weight: 600; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 10px; text-align: left;
    border-bottom: 2px solid #d2a8ff30; white-space: nowrap; position: sticky; top: 0;
  }
  .premium-table td { padding: 6px 10px; border-bottom: 1px solid #21262d; color: #c9d1d9; }
  .premium-table tr:hover td { background: #1c212980; }
  .premium-table-wrap {
    background: #161b22; border: 1px solid #21262d; border-radius: 10px;
    overflow: auto; max-height: 450px;
  }
  .audit-yes { color: #d29922; font-weight: 600; }
  .audit-no { color: #3fb950; font-weight: 600; }

  /* ==================== LOADING / EMPTY ==================== */
  .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: #8b949e; gap: 8px; }
  .spinner { width: 18px; height: 18px; border: 2px solid #21262d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 40px; color: #8b949e; }

  /* ==================== SCROLLBAR ==================== */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }
</style>
</head>
<body>

<!-- ==================== SIDEBAR ==================== -->
<nav class="sidebar">
  <div class="sidebar-header">
    <h1><span class="icon">QA</span> Automation Reports</h1>
  </div>

  <div class="sidebar-label">Dashboards</div>
  <div class="nav-item active" onclick="navigateTo('dashboard', this)" id="nav-dashboard">
    <span class="nav-icon">&#9632;</span> Dashboard
  </div>

  <div class="sidebar-label">Applications</div>
  <div class="nav-item" onclick="navigateTo('ess', this)" id="nav-ess">
    <span class="nav-icon">&#9671;</span> ESS
  </div>
  <div class="nav-item" onclick="navigateTo('clarety', this)" id="nav-clarety">
    <span class="nav-icon">&#9671;</span> Clarety
  </div>
  <div class="nav-item" onclick="navigateTo('miaccount', this)" id="nav-miaccount">
    <span class="nav-icon">&#9671;</span> MiAccount
  </div>

  <div class="sidebar-label">Monitoring</div>
  <div class="nav-item" onclick="navigateTo('envdates', this)" id="nav-envdates">
    <span class="nav-icon">&#9729;</span> Environment Status
  </div>

  <div class="sidebar-label">Tools</div>
  <div class="nav-item" onclick="navigateTo('healthcare', this)" id="nav-healthcare">
    <span class="nav-icon">&#9881;</span> Healthcare Rate Update
  </div>

  <div class="sidebar-footer">
    <a href="/ai" target="_blank"><span class="nav-icon">&#9733;</span> AI Tools</a>
  </div>
</nav>

<!-- ==================== MAIN AREA ==================== -->
<div class="main">

  <!-- Top Filter Bar -->
  <div class="filter-bar">
    <div class="page-title" id="pageTitle">Dashboard</div>
    <label class="filter-label">Project</label>
    <select class="filter-select" id="filterProject" onchange="applyFilters()">
      <option value="all">All Projects</option>
      <option value="App_Migration">App Migration</option>
      <option value="ADA">ADA</option>
      <option value="Maintenance">Maintenance</option>
    </select>
    <label class="filter-label">Test Type</label>
    <select class="filter-select" id="filterTestType" onchange="applyFilters()">
      <option value="all">All Types</option>
      <option value="functional">Functional (Playwright)</option>
      <option value="performance">Performance (Locust)</option>
    </select>
  </div>

  <!-- Content Area -->
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div> Loading dashboard...</div>
  </div>
</div>

<script>
// ===========================
// STATE
// ===========================
var dashboardData = null;
var currentView = 'dashboard';
var currentSystemFilter = null;
var currentResultsData = null;

// ===========================
// NAVIGATION
// ===========================
function navigateTo(view, el) {
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  if (el) el.classList.add('active');
  currentView = view;

  var titles = {
    dashboard: 'Dashboard',
    ess: 'ESS - Employee Self Service',
    clarety: 'Clarety',
    miaccount: 'MiAccount (WSS)',
    envdates: 'Environment Status',
    healthcare: 'Healthcare Rate Update'
  };
  document.getElementById('pageTitle').textContent = titles[view] || 'Dashboard';

  var filterBar = document.querySelector('.filter-bar');
  var showFilters = ['dashboard', 'ess', 'clarety', 'miaccount'].indexOf(view) !== -1;
  document.getElementById('filterProject').style.display = showFilters ? '' : 'none';
  document.getElementById('filterTestType').style.display = showFilters ? '' : 'none';
  filterBar.querySelectorAll('.filter-label').forEach(function(l) { l.style.display = showFilters ? '' : 'none'; });

  var systemMap = { ess: 'ESS', clarety: 'CLT', miaccount: 'WSS' };
  currentSystemFilter = systemMap[view] || null;

  if (view === 'envdates') { loadEnvDates(); return; }
  if (view === 'healthcare') { loadHealthcareTool(); return; }

  renderDashboard();
}

// ===========================
// DATA LOADING
// ===========================
async function loadDashboardData() {
  try {
    var res = await fetch('/api/dashboard/all-runs');
    dashboardData = await res.json();
  } catch(e) {
    dashboardData = { functional: [], performance: [] };
  }
  renderDashboard();
}

function getFilteredRuns() {
  if (!dashboardData) return { functional: [], performance: [] };
  var proj = document.getElementById('filterProject').value;
  var type = document.getElementById('filterTestType').value;

  var func = dashboardData.functional;
  var perf = dashboardData.performance;

  if (currentSystemFilter) {
    func = func.filter(function(r) { return r.system === currentSystemFilter; });
    perf = perf.filter(function(r) { return r.system === currentSystemFilter; });
  }
  if (proj !== 'all') {
    func = func.filter(function(r) { return r.project === proj; });
    perf = perf.filter(function(r) { return r.project === proj; });
  }

  if (type === 'functional') perf = [];
  if (type === 'performance') func = [];

  return { functional: func, performance: perf };
}

// DASHBOARD RENDERING
// ===========================
function renderDashboard() {
  if (!dashboardData) return;
  var data = getFilteredRuns();
  var runs = data.functional;
  var content = document.getElementById('content');

  var totalTests = runs.reduce(function(s,r) { return s + r.total; }, 0);
  var totalPassed = runs.reduce(function(s,r) { return s + r.passed; }, 0);
  var totalFailed = runs.reduce(function(s,r) { return s + r.failed; }, 0);
  var totalBroken = runs.reduce(function(s,r) { return s + (r.broken||0); }, 0);
  var totalDuration = runs.reduce(function(s,r) { return s + r.duration; }, 0);
  var passRate = totalTests > 0 ? ((totalPassed / totalTests) * 100).toFixed(1) : '0.0';
  var failRate = totalTests > 0 ? ((totalFailed / totalTests) * 100).toFixed(1) : '0.0';
  var errorRate = totalTests > 0 ? ((totalBroken / totalTests) * 100).toFixed(1) : '0.0';

  var html = '';

  // Stats bar
  html += '<div class="stats-bar">';
  html += '<div class="stat-item"><div class="stat-value color-blue">' + runs.length + '</div><div class="stat-label">Total Runs</div></div>';
  html += '<div class="stat-item"><div class="stat-value color-gray">' + formatDuration(totalDuration) + '</div><div class="stat-label">Execution Time</div></div>';
  html += '<div class="stat-item"><div class="stat-value color-green">' + passRate + '%</div><div class="stat-label">Passed</div></div>';
  html += '<div class="stat-item"><div class="stat-value color-red">' + failRate + '%</div><div class="stat-label">Failed</div></div>';
  html += '<div class="stat-item"><div class="stat-value color-orange">' + errorRate + '%</div><div class="stat-label">Broken</div></div>';
  html += '<div class="stat-item"><div class="stat-value color-purple">' + totalTests + '</div><div class="stat-label">Total Tests</div></div>';
  html += '</div>';

  // Charts row
  html += '<div class="charts-row">';
  html += '<div class="chart-card"><div class="chart-card-header"><div class="chart-card-title">Test runs per day</div></div><div class="chart-container"><canvas id="trendChart"></canvas></div></div>';
  html += '<div class="chart-card"><div class="chart-card-header"><div class="chart-card-title">Results by status</div></div><div class="donut-container"><canvas id="donutChart"></canvas></div></div>';
  html += '</div>';

  // Recent runs table
  html += '<div class="runs-card">';
  html += '<div class="runs-header"><div class="table-card-title">Latest test runs</div><div style="font-size:11px;color:#8b949e;">' + runs.length + ' runs</div></div>';
  html += '<div class="runs-table-wrap"><table class="runs-table"><thead><tr>';
  html += '<th>Status</th><th>System</th><th>Project</th><th>Date</th><th>Progress</th><th>Passed</th><th>Failed</th><th>Total</th><th>Duration</th><th>Actions</th>';
  html += '</tr></thead><tbody id="runsBody">';

  var displayRuns = runs.slice(0, 50);
  displayRuns.forEach(function(r) {
    var pPct = r.total > 0 ? (r.passed/r.total*100) : 0;
    var fPct = r.total > 0 ? (r.failed/r.total*100) : 0;
    var bPct = r.total > 0 ? ((r.broken||0)/r.total*100) : 0;
    var badgeClass = r.system === 'ESS' ? 'badge-ess' : r.system === 'CLT' ? 'badge-clt' : 'badge-wss';

    html += '<tr>';
    html += '<td><span class="status-dot ' + r.status + '"></span>' + r.status + '</td>';
    html += '<td><span class="system-badge ' + badgeClass + '">' + r.system + '</span></td>';
    html += '<td>' + r.project.replace('_',' ') + '</td>';
    html += '<td>' + formatDate(r.date) + '</td>';
    html += '<td><div class="progress-mini"><div class="bar-p" style="width:' + pPct + '%"></div><div class="bar-f" style="width:' + fPct + '%"></div><div class="bar-b" style="width:' + bPct + '%"></div></div></td>';
    html += '<td class="num-col" style="color:#3fb950">' + r.passed + '</td>';
    html += '<td class="num-col" style="color:#f85149">' + r.failed + '</td>';

    html += '<button class="btn-sm" onclick="event.stopPropagation();openReportInline(\'' + encodeURIComponent(r.reportUrl) + '\',\'' + r.system + ' / ' + r.project.replace('_',' ') + '\')">Report</button>';

// ===========================
// CHARTS
// ===========================
function renderCharts(runs) {
  renderTrendChart(runs);
  renderDonutChart(runs);
}

function renderTrendChart(runs) {
  var canvas = document.getElementById('trendChart');
  if (!canvas) return;

  var dayMap = {};
  runs.forEach(function(r) {
    var d = r.date.substring(0, 10);
    if (!dayMap[d]) dayMap[d] = { passed: 0, failed: 0, broken: 0 };
    dayMap[d].passed += r.passed;
    dayMap[d].failed += r.failed;
    dayMap[d].broken += (r.broken || 0);
  });

  var days = Object.keys(dayMap).sort().slice(-14);
  var labels = days.map(function(d) {
    var dt = new Date(d);
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  });

  new Chart(canvas, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'Passed', data: days.map(function(d) { return dayMap[d].passed; }), borderColor: '#3fb950', backgroundColor: '#3fb95020', tension: 0.3, fill: true, pointRadius: 3 },
        { label: 'Failed', data: days.map(function(d) { return dayMap[d].failed; }), borderColor: '#f85149', backgroundColor: '#f8514920', tension: 0.3, fill: true, pointRadius: 3 },
        { label: 'Broken', data: days.map(function(d) { return dayMap[d].broken; }), borderColor: '#d29922', backgroundColor: '#d2992220', tension: 0.3, fill: true, pointRadius: 3 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: '#8b949e', boxWidth: 12, padding: 16, font: { size: 11 } } } },
      scales: {
        x: { grid: { color: '#21262d' }, ticks: { color: '#8b949e', font: { size: 10 } } },
        y: { grid: { color: '#21262d' }, ticks: { color: '#8b949e', font: { size: 10 } }, beginAtZero: true }
      }
    }
  });
}

function renderDonutChart(runs) {
  var canvas = document.getElementById('donutChart');
  if (!canvas) return;

  var totalPassed = runs.reduce(function(s,r) { return s + r.passed; }, 0);
  var totalFailed = runs.reduce(function(s,r) { return s + r.failed; }, 0);
  var totalBroken = runs.reduce(function(s,r) { return s + (r.broken||0); }, 0);
  var totalSkipped = runs.reduce(function(s,r) { return s + (r.skipped||0); }, 0);
  var total = totalPassed + totalFailed + totalBroken + totalSkipped;

  new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: ['Passed', 'Failed', 'Broken', 'Skipped'],
      datasets: [{
        data: [totalPassed, totalFailed, totalBroken, totalSkipped],
        backgroundColor: ['#3fb950', '#f85149', '#d29922', '#484f58'],
        borderColor: '#161b22',
        borderWidth: 3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { color: '#8b949e', boxWidth: 10, padding: 12, font: { size: 11 } } }
      }
    },
    plugins: [{
      id: 'centerText',
      beforeDraw: function(chart) {
        var ctx = chart.ctx;
        var centerX = (chart.chartArea.left + chart.chartArea.right) / 2;
        var centerY = (chart.chartArea.top + chart.chartArea.bottom) / 2;
        ctx.save();
        ctx.fillStyle = '#f0f6fc';
        ctx.font = 'bold 22px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(total > 0 ? Math.round(totalPassed/total*100) + '%' : '0%', centerX, centerY + 4);
        ctx.fillStyle = '#8b949e';
        ctx.font = '10px -apple-system, sans-serif';
        ctx.textBaseline = 'top';
        ctx.fillText('PASS RATE', centerX, centerY + 8);
        ctx.restore();
      }
    }]
  });
}

// ===========================
// INLINE RESULTS
// ===========================
async function openResultsInline(app, project, runId) {
  var panel = document.getElementById('resultsPanel');
  panel.classList.add('active');
  panel.innerHTML = '<div class="inline-panel-header"><div class="inline-panel-title">' + app + ' / ' + project.replace('_',' ') + ' - ' + runId + '</div><div class="inline-panel-actions"><button class="btn-close-panel" onclick="closeResultsPanel()">&times;</button></div></div><div class="loading"><div class="spinner"></div> Loading results...</div>';
  panel.scrollIntoView({ behavior: 'smooth' });

  try {
    var res = await fetch('/api/' + app + '/' + project + '/' + runId + '/results');
    var data = await res.json();

    if (!data.sheets || data.sheets.length === 0) {
      panel.innerHTML = '<div class="inline-panel-header"><div class="inline-panel-title">' + app + ' / ' + project.replace('_',' ') + ' - ' + runId + '</div><div class="inline-panel-actions"><button class="btn-close-panel" onclick="closeResultsPanel()">&times;</button></div></div><div class="empty-state">No CSV results found for this run.</div>';
      return;
    }

    var testPlanSheet = null;
    for (var i = 0; i < data.sheets.length; i++) {
      if (data.sheets[i].name === 'TestPlan') { testPlanSheet = data.sheets[i]; break; }
    }
    if (!testPlanSheet) testPlanSheet = data.sheets[0];

    var memberStats = {};
    data.sheets.forEach(function(sheet) {
      if (sheet.name === 'TestPlan') return;
      sheet.rows.forEach(function(row) {
        var testMethod = row['TestMethod'] || row['TestName'] || '';
        if (!testMethod) return;
        if (!memberStats[testMethod]) memberStats[testMethod] = { passed: 0, failed: 0, broken: 0, total: 0 };
        var st = (row['FinalStatus'] || row['Status'] || '').trim().toLowerCase();
        memberStats[testMethod].total++;
        if (st === 'passed' || st === 'pass') memberStats[testMethod].passed++;
        else if (st === 'failed' || st === 'fail') memberStats[testMethod].failed++;
        else if (st === 'broken') memberStats[testMethod].broken++;
      });
    });

    var displayHeaders = ['TestName', 'TestType', 'Status', 'Passed', 'Failed', 'Broken', 'Timestamp'];
    var mappedRows = testPlanSheet.rows.map(function(row) {
      var rawStatus = (row['Status'] || row['FinalStatus'] || '').trim();
      var displayStatus;
      if (rawStatus.toLowerCase() === 'passed' || rawStatus.toLowerCase() === 'pass') displayStatus = 'Pass';
      else if (rawStatus.toLowerCase() === 'failed' || rawStatus.toLowerCase() === 'fail') displayStatus = 'Fail';
      else if (rawStatus.toLowerCase() === 'broken') displayStatus = 'Broken';
      else displayStatus = 'Not Executed';
      var testMethod = row['TestMethod'] || '';
      var stats = memberStats[testMethod] || { passed: 0, failed: 0, broken: 0, total: 0 };
      return {
        'TestName': row['TestName'] || '',
        'TestType': row['TestType'] || '',
        'Status': displayStatus,
        'Passed': stats.total > 0 ? stats.passed : '',
        'Failed': stats.total > 0 ? stats.failed : '',
        'Broken': stats.total > 0 ? stats.broken : '',
        'Timestamp': row['Timestamp'] || row['TimeStamp'] || ''
      };
    });

    currentResultsData = { headers: displayHeaders, rows: mappedRows };

    var panelHtml = '<div class="inline-panel-header"><div class="inline-panel-title">' + app + ' / ' + project.replace('_',' ') + ' - ' + runId + '</div><div class="inline-panel-actions"><button class="btn-close-panel" onclick="closeResultsPanel()">&times;</button></div></div>';
    panelHtml += '<div class="results-toolbar"><input type="text" class="results-search" id="inlineResultsSearch" placeholder="Search tests..." oninput="filterInlineResults()"><select class="results-filter" id="inlineStatusFilter" onchange="filterInlineResults()"><option value="">All Statuses</option><option value="Pass">Pass</option><option value="Fail">Fail</option><option value="Broken">Broken</option><option value="Not Executed">Not Executed</option></select></div>';
    panelHtml += '<div class="results-count" id="inlineResultsCount"></div>';
    panelHtml += '<div class="results-table-wrap"><table class="results-table"><thead id="inlineResultsHead"></thead><tbody id="inlineResultsBody"></tbody></table></div>';

    panel.innerHTML = panelHtml;
    renderInlineResults(mappedRows, displayHeaders);
  } catch(err) {
    panel.innerHTML = '<div class="inline-panel-header"><div class="inline-panel-title">Error</div><div class="inline-panel-actions"><button class="btn-close-panel" onclick="closeResultsPanel()">&times;</button></div></div><div class="empty-state" style="color:#f85149">Error: ' + err.message + '</div>';
  }
}

function renderInlineResults(rows, headers) {
  var headHtml = '<tr>';
  headers.forEach(function(h) { headHtml += '<th onclick="sortInlineResults(\'' + h + '\')">' + h + '</th>'; });
  headHtml += '</tr>';
  document.getElementById('inlineResultsHead').innerHTML = headHtml;

  var bodyHtml = '';
  rows.forEach(function(row) {
    bodyHtml += '<tr>';
    headers.forEach(function(h) {
      var val = row[h] || '';
      var cls = '';
      if (h === 'Status') {
        if (val === 'Pass') cls = ' class="status-passed"';
        else if (val === 'Fail') cls = ' class="status-failed"';
        else if (val === 'Broken') cls = ' class="status-broken"';
        else cls = ' class="status-notrun"';
      } else if (h === 'Passed' && val !== '') {
        cls = ' style="color:#3fb950;font-weight:600"';
      } else if (h === 'Failed' && val !== '' && val > 0) {
        cls = ' style="color:#f85149;font-weight:600"';
      } else if (h === 'Broken' && val !== '' && val > 0) {
        cls = ' style="color:#d29922;font-weight:600"';
      }
      bodyHtml += '<td' + cls + '>' + val + '</td>';
    });
    bodyHtml += '</tr>';
  });
  if (rows.length === 0) bodyHtml = '<tr><td colspan="' + headers.length + '" style="padding:20px;color:#484f58;text-align:center">No matching results</td></tr>';
  document.getElementById('inlineResultsBody').innerHTML = bodyHtml;
  document.getElementById('inlineResultsCount').textContent = rows.length + ' test' + (rows.length !== 1 ? 's' : '') + ' shown';
}

function filterInlineResults() {
  if (!currentResultsData) return;
  var searchTerm = document.getElementById('inlineResultsSearch').value.toLowerCase();
  var statusFilter = document.getElementById('inlineStatusFilter').value;
  var filtered = currentResultsData.rows.filter(function(row) {
    if (statusFilter && row['Status'] !== statusFilter) return false;
    if (searchTerm) {
      var match = false;
      Object.values(row).forEach(function(v) { if (String(v).toLowerCase().indexOf(searchTerm) !== -1) match = true; });
      if (!match) return false;
    }
    return true;
  });
  renderInlineResults(filtered, currentResultsData.headers);
}

var inlineSortCol = '', inlineSortAsc = true;
function sortInlineResults(col) {
  if (inlineSortCol === col) { inlineSortAsc = !inlineSortAsc; } else { inlineSortCol = col; inlineSortAsc = true; }
  currentResultsData.rows.sort(function(a, b) {
    var va = (a[col] || '').toString().toLowerCase();
    var vb = (b[col] || '').toString().toLowerCase();
    if (va < vb) return inlineSortAsc ? -1 : 1;
    if (va > vb) return inlineSortAsc ? 1 : -1;
    return 0;
  });
  filterInlineResults();
}

function closeResultsPanel() {
  var panel = document.getElementById('resultsPanel');
  panel.classList.remove('active');
  panel.innerHTML = '';
}

async function loadEnvDates() {

  try {
    var histRes = await fetch('/api/env-dates/history');

    var latestData = await latestRes.json();

    if (!latestData) {
      content.innerHTML = '<div class="empty-state">No environment data published yet.<br>Run: python daily_env_check.py --publish-dashboard</div>';
      return;
    }

    var html = '';

    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">';
    html += '<div style="font-size:13px;color:#8b949e;">Last updated: ' + (latestData.timestamp || 'N/A') + '</div>';

async function loadEnvDateByDate(date) {
  if (date === 'latest') { loadEnvDates(); return; }
  try {
    var res = await fetch('/api/env-dates/' + date);
    var data = await res.json();
    if (!data) return;
    var tableContainer = document.querySelector('.env-table-container');
    if (tableContainer) tableContainer.innerHTML = renderEnvTable(data);
  } catch(e) {}
}

function renderEnvTable(data) {
  if (!data || !data.environments) return '<div class="empty-state">No data</div>';
  var envs = data.environments;
  var html = '<div class="env-table-container"><div style="overflow-x:auto"><table class="env-dates-table"><thead><tr>';
  html += '<th>Env</th><th>Assignment</th><th>Business Date</th><th>MIORS</th><th>WSS</th><th>ESS</th>';
  html += '</tr></thead><tbody>';

  var envOrder = ["UAT11","UAT12","UAT13","UAT21","UAT22","UAT23","UAT25","UAT31","UAT32","UAT33","UAT37","UAT38","UAT41","UAT42","UAT43","UAT46","UAT51","UAT52","UAT53","UAT65","UAT75","UAT45","UAT48","UAT85","TT"];

  envOrder.forEach(function(env) {
    var e = envs[env];
    if (!e) return;
    var bizClass = e.businessDate && e.businessDate !== 'N/A' ? 'env-date-ok' : 'env-date-bad';

    function statusClass(val) {
      if (!val || val === 'N/A' || val === '') return 'status-empty';
      var v = val.toLowerCase();
      if (v === 'ok') return 'env-status-ok';
      if (v === 'down' || v === 'bad login') return 'env-status-down';
      return 'env-status-warn';
    }

    html += '<tr>';
    html += '<td class="env-name">' + env + '</td>';
    html += '<td class="env-assignment">' + (e.assignment || '') + '</td>';
    html += '<td class="' + bizClass + '">' + (e.businessDate || 'N/A') + '</td>';
    html += '<td class="' + statusClass(e.miors) + '">' + (e.miors || '-') + '</td>';
    html += '<td class="' + statusClass(e.wss) + '">' + (e.wss || '-') + '</td>';
    html += '<td class="' + statusClass(e.ess) + '">' + (e.ess || '-') + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table></div></div>';
  return html;
}

var _premiumData = null;
async function loadHealthcareTool() {
  var content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div> Loading tool...</div>';

  try {
    var res = await fetch('/api/tools/healthcare-rate-update/data');

    var html = '';
    html += '<div class="tool-info-banner"><div class="tool-info-icon">&#9881;</div><div class="tool-info-text"><h3>Healthcare Rate Update Utility</h3><p>Automates insurance premium updates across all retirement systems. Upload a CSV with new rates, review the data, then trigger execution.</p></div></div>';

    if (_premiumData && _premiumData.rows && _premiumData.rows.length > 0) {
      var rows = _premiumData.rows;
      var systems = {};
      var auditCount = 0;
      rows.forEach(function(r) {
        var sys = r['RetirementSystemValue'] || r['Retirement System'] || r['System'] || 'Unknown';
        systems[sys] = (systems[sys] || 0) + 1;
        if ((r['AuditRequired'] || r['Audit Required'] || '') === 'Yes') auditCount++;
      });

      html += '<div class="stats-bar" style="margin-bottom:16px;">';
      html += '<div class="stat-item"><div class="stat-value color-purple">' + Object.keys(systems).length + '</div><div class="stat-label">Systems</div></div>';
      html += '<div class="stat-item"><div class="stat-value color-blue">' + rows.length + '</div><div class="stat-label">Records</div></div>';
      html += '<div class="stat-item"><div class="stat-value color-orange">' + auditCount + '</div><div class="stat-label">Audit Required</div></div>';
      html += '</div>';

      var tabs = ['None', 'NonMedicare', 'Medicare', 'NotApplicable', 'MPSERS'];
      html += '<div class="medicare-tabs" id="medicareTabs">';
      tabs.forEach(function(t, i) {
        html += '<button class="med-tab' + (i === 0 ? ' active' : '') + '" onclick="switchMedicareTab(\'' + t + '\', this)">' + t + '</button>';
      });
      html += '</div>';

      html += '<div class="premium-table-wrap"><table class="premium-table"><thead id="premiumHead"></thead><tbody id="premiumBody"></tbody></table></div>';
      html += '<div id="premiumCount" style="font-size:11px;color:#8b949e;margin-top:8px;"></div>';
    } else {
      html += '<div class="empty-state">No premium data. Upload a CSV or place sample_data.csv in reports/Tools/HealthcareRateUpdate/</div>';
    }

    content.innerHTML = html;
    if (_premiumData && _premiumData.rows && _premiumData.rows.length > 0) {
      renderPremiumTable('None');
    }
  } catch(err) {
    content.innerHTML = '<div class="empty-state" style="color:#f85149">Error: ' + err.message + '</div>';
  }
}

function switchMedicareTab(tab, el) {
  document.querySelectorAll('.med-tab').forEach(function(t) { t.classList.remove('active'); });
  if (el) el.classList.add('active');
  renderPremiumTable(tab);
}

function renderPremiumTable(medicareStatus) {
  if (!_premiumData || !_premiumData.headers) return;
  var allHeaders = _premiumData.headers;
  var rows = _premiumData.rows;

  var suffixMap = { None: '_None', NonMedicare: '_NonMedicare', Medicare: '_Medicare', NotApplicable: '_NotApplicable', MPSERS: '_MPSERS' };
  var suffix = suffixMap[medicareStatus] || '_None';

  var premCols = allHeaders.filter(function(h) { return h.endsWith(suffix); });
  var productCol = allHeaders.indexOf('Product Name') !== -1 ? 'Product Name' : 'ProductDescription';
  var systemCol = allHeaders.indexOf('Retirement System') !== -1 ? 'Retirement System' : 'RetirementSystemValue';
  var auditCol = allHeaders.indexOf('Audit Required') !== -1 ? 'Audit Required' : 'AuditRequired';
  var displayCols = [productCol, systemCol, auditCol].concat(premCols);

  var headHtml = '<tr>';
  displayCols.forEach(function(h) {
    var label = h.replace(suffix, '').replace(/_/g, ' ').replace(/([A-Z])/g, ' $1').trim();
    if (h === productCol) label = 'Product';
    if (h === systemCol) label = 'System';
    if (h === auditCol) label = 'Audit';
    headHtml += '<th>' + label + '</th>';
  });
  headHtml += '</tr>';
  document.getElementById('premiumHead').innerHTML = headHtml;

  var bodyHtml = '';
  var dataCount = 0;
  rows.forEach(function(row) {
    var hasData = premCols.some(function(c) { return row[c] && row[c] !== '' && row[c] !== '0' && row[c] !== '0.0' && row[c] !== '$0.00'; });
    if (hasData) dataCount++;
    bodyHtml += '<tr style="' + (hasData ? '' : 'opacity:0.35') + '">';
    displayCols.forEach(function(h) {
      var val = row[h] || '';
      if (h === systemCol) {
        var bc = val === 'MPSERS' ? 'badge-clt' : val === 'SERS' ? 'badge-ess' : 'badge-wss';
        bodyHtml += '<td><span class="system-badge ' + bc + '">' + val + '</span></td>';
      } else if (h === auditCol) {
        bodyHtml += '<td class="' + (val === 'Yes' ? 'audit-yes' : 'audit-no') + '">' + val + '</td>';
      } else {
        bodyHtml += '<td>' + val + '</td>';
      }
    });
    bodyHtml += '</tr>';
  });
  document.getElementById('premiumBody').innerHTML = bodyHtml;
  document.getElementById('premiumCount').textContent = dataCount + ' of ' + rows.length + ' records have data for ' + medicareStatus + ' status';
}

// ===========================
// UTILITIES
// ===========================
function formatDate(isoStr) {
  if (!isoStr) return '-';
  var d = new Date(isoStr);
  if (isNaN(d.getTime())) return isoStr;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function formatDateShort(isoStr) {
  if (!isoStr) return '-';
  var d = new Date(isoStr);
  if (isNaN(d.getTime())) return isoStr;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDuration(ms) {
  if (!ms || ms === 0) return '-';
  var seconds = Math.floor(ms / 1000);
  if (seconds < 60) return seconds + 's';
  var minutes = Math.floor(seconds / 60);
  var secs = seconds % 60;
  if (minutes < 60) return minutes + 'm ' + secs + 's';
  var hours = Math.floor(minutes / 60);
  var mins = minutes % 60;
  return hours + 'h ' + mins + 'm';
}

// INIT
// ===========================
document.addEventListener('DOMContentLoaded', function() {
  loadDashboardData();
});
</script>
