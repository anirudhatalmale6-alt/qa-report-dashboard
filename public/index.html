<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORS - QA Automation Reports</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: #0f1117;
    color: #e1e4e8;
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: #161b22;
    border-right: 1px solid #21262d;
    height: 100vh;
    position: fixed;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid #21262d;
  }

  .sidebar-header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #58a6ff;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-header h1 .icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, #58a6ff, #3fb950);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
  }

  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8b949e;
    padding: 16px 20px 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    color: #c9d1d9;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
  }

  .nav-item:hover {
    background: #1c2129;
    color: #f0f6fc;
  }

  .nav-item .chevron {
    font-size: 10px;
    color: #484f58;
    transition: transform 0.2s ease;
  }

  .nav-item.expanded .chevron {
    transform: rotate(90deg);
  }

  .nav-sub {
    display: none;
    background: #0d1117;
  }

  .nav-sub.open {
    display: block;
  }

  .nav-sub-item {
    display: flex;
    align-items: center;
    padding: 7px 20px 7px 44px;
    color: #8b949e;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
  }

  .nav-sub-item::before {
    content: '';
    position: absolute;
    left: 32px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #21262d;
  }

  .nav-sub-item:hover {
    background: #161b22;
    color: #c9d1d9;
  }

  .nav-sub-item.active {
    background: #1c2129;
    color: #58a6ff;
  }

  .nav-sub-item.active::before {
    background: #58a6ff;
    width: 2px;
  }

  .nav-sub-item .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #484f58;
    margin-right: 10px;
    flex-shrink: 0;
  }

  .nav-sub-item.active .dot {
    background: #58a6ff;
  }

  /* Main Content */
  .main {
    margin-left: 260px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .header {
    height: 56px;
    background: #161b22;
    border-bottom: 1px solid #21262d;
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: #f0f6fc;
  }

  .header-breadcrumb {
    font-size: 13px;
    color: #8b949e;
  }

  .header-breadcrumb span {
    color: #58a6ff;
  }

  .content {
    padding: 24px;
    flex: 1;
  }

  /* Welcome State */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    text-align: center;
  }

  .welcome-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #58a6ff20, #3fb95020);
    border: 1px solid #21262d;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 16px;
  }

  .welcome h2 {
    font-size: 20px;
    font-weight: 600;
    color: #c9d1d9;
    margin-bottom: 8px;
  }

  .welcome p {
    font-size: 14px;
    color: #8b949e;
  }

  /* Stats Cards */
  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    flex: 1;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    padding: 16px 20px;
    text-align: center;
  }

  .stat-card .value {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .stat-card .label {
    font-size: 12px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat-card.runs .value { color: #58a6ff; }
  .stat-card.passed .value { color: #3fb950; }
  .stat-card.failed .value { color: #f85149; }
  .stat-card.rate .value { color: #d29922; }

  /* Section Title */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 18px;
    font-weight: 600;
    color: #f0f6fc;
  }

  .section-badge {
    background: #21262d;
    color: #8b949e;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
  }

  /* Run Cards */
  .run-card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    transition: all 0.15s ease;
  }

  .run-card:hover {
    border-color: #30363d;
    background: #1c2129;
  }

  .run-status-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    margin-right: 16px;
    flex-shrink: 0;
  }

  .run-status-icon.passed {
    background: #3fb95015;
    color: #3fb950;
    border: 1px solid #3fb95030;
  }

  .run-status-icon.failed {
    background: #f8514915;
    color: #f85149;
    border: 1px solid #f8514930;
  }

  .run-info {
    flex: 1;
    min-width: 0;
  }

  .run-date {
    font-size: 14px;
    font-weight: 500;
    color: #c9d1d9;
  }

  .run-id {
    font-size: 12px;
    color: #484f58;
    margin-top: 2px;
  }

  .run-bar {
    width: 200px;
    height: 6px;
    background: #21262d;
    border-radius: 3px;
    overflow: hidden;
    margin: 0 20px;
    flex-shrink: 0;
  }

  .run-bar-inner {
    height: 100%;
    display: flex;
  }

  .run-bar-passed {
    background: #3fb950;
    transition: width 0.3s ease;
  }

  .run-bar-failed {
    background: #f85149;
    transition: width 0.3s ease;
  }

  .run-stats {
    display: flex;
    gap: 20px;
    margin: 0 20px;
    flex-shrink: 0;
  }

  .run-stat {
    text-align: center;
    min-width: 40px;
  }

  .run-stat .num {
    font-size: 15px;
    font-weight: 600;
  }

  .run-stat .lbl {
    font-size: 10px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .run-stat.p .num { color: #3fb950; }
  .run-stat.f .num { color: #f85149; }
  .run-stat.t .num { color: #c9d1d9; }

  .run-duration {
    font-size: 13px;
    color: #8b949e;
    margin: 0 16px;
    min-width: 50px;
    text-align: center;
    flex-shrink: 0;
  }

  .run-action {
    flex-shrink: 0;
  }

  .btn-open {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    background: transparent;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #58a6ff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s ease;
  }

  .btn-open:hover {
    background: #58a6ff15;
    border-color: #58a6ff40;
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 40px;
    color: #8b949e;
  }

  .empty-state .es-icon {
    font-size: 32px;
    margin-bottom: 12px;
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: #8b949e;
    gap: 8px;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid #21262d;
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-header">
    <h1><span class="icon">QA</span> Automation Reports</h1>
  </div>

  <div class="sidebar-label">Projects</div>

  <div class="nav-item" onclick="toggleNav(this, 'sub-appmigration')">
    AppMigration <span class="chevron">&#9654;</span>
  </div>
  <div id="sub-appmigration" class="nav-sub">
    <div class="nav-sub-item" onclick="loadRuns('AppMigration', 'ES', this)"><span class="dot"></span>ES</div>
    <div class="nav-sub-item" onclick="loadRuns('AppMigration', 'CS', this)"><span class="dot"></span>CS</div>
    <div class="nav-sub-item" onclick="loadRuns('AppMigration', 'SS', this)"><span class="dot"></span>SS</div>
  </div>

  <div class="nav-item" onclick="toggleNav(this, 'sub-ada')">
    ADA <span class="chevron">&#9654;</span>
  </div>
  <div id="sub-ada" class="nav-sub">
    <div class="nav-sub-item" onclick="loadRuns('ADA', 'ES', this)"><span class="dot"></span>ES</div>
    <div class="nav-sub-item" onclick="loadRuns('ADA', 'CS', this)"><span class="dot"></span>CS</div>
    <div class="nav-sub-item" onclick="loadRuns('ADA', 'SS', this)"><span class="dot"></span>SS</div>
  </div>

  <div class="nav-item" onclick="toggleNav(this, 'sub-maintenance')">
    Maintenance <span class="chevron">&#9654;</span>
  </div>
  <div id="sub-maintenance" class="nav-sub">
    <div class="nav-sub-item" onclick="loadRuns('Maintenance', 'ES', this)"><span class="dot"></span>ES</div>
    <div class="nav-sub-item" onclick="loadRuns('Maintenance', 'CS', this)"><span class="dot"></span>CS</div>
    <div class="nav-sub-item" onclick="loadRuns('Maintenance', 'SS', this)"><span class="dot"></span>SS</div>
  </div>
</nav>

<div class="main">
  <div class="header">
    <div class="header-title">QA - Automation Reports</div>
    <div id="breadcrumb" class="header-breadcrumb"></div>
  </div>

  <div class="content" id="content">
    <div class="welcome">
      <div class="welcome-icon">&#128202;</div>
      <h2>Welcome to QA Reports</h2>
      <p>Select a project and system from the sidebar to view test runs</p>
    </div>
  </div>
</div>

<script>
function toggleNav(item, subId) {
  var sub = document.getElementById(subId);
  sub.classList.toggle('open');
  item.classList.toggle('expanded');
}

function setActive(el) {
  document.querySelectorAll('.nav-sub-item').forEach(function(item) {
    item.classList.remove('active');
  });
  if (el) el.classList.add('active');
}

async function loadRuns(category, system, el) {
  setActive(el);

  var breadcrumb = document.getElementById('breadcrumb');
  breadcrumb.innerHTML = '<span>' + category + '</span> / <span>' + system + '</span>';

  var content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div> Loading runs...</div>';

  try {
    var res = await fetch('/api/' + category + '/' + system + '/runs');
    var runs = await res.json();

    if (runs.length === 0) {
      content.innerHTML =
        '<div class="section-header"><div class="section-title">' + category + ' &rsaquo; ' + system + '</div></div>' +
        '<div class="empty-state"><div class="es-icon">&#128193;</div><p>No runs found yet.<br>Run tests with --project=' + category + '/' + system + ' to see results here.</p></div>';
      return;
    }

    var totalPassed = 0, totalFailed = 0, totalTests = 0;
    runs.forEach(function(r) {
      totalPassed += r.passed;
      totalFailed += r.failed;
      totalTests += r.total;
    });
    var passRate = totalTests > 0 ? ((totalPassed / totalTests) * 100).toFixed(1) : '0.0';

    var html = '';
    html += '<div class="stats-row">';
    html += '<div class="stat-card runs"><div class="value">' + runs.length + '</div><div class="label">Total Runs</div></div>';
    html += '<div class="stat-card passed"><div class="value">' + totalPassed + '</div><div class="label">Tests Passed</div></div>';
    html += '<div class="stat-card failed"><div class="value">' + totalFailed + '</div><div class="label">Tests Failed</div></div>';
    html += '<div class="stat-card rate"><div class="value">' + passRate + '%</div><div class="label">Pass Rate</div></div>';
    html += '</div>';

    html += '<div class="section-header"><div class="section-title">' + category + ' &rsaquo; ' + system + '</div><div class="section-badge">' + runs.length + ' run' + (runs.length !== 1 ? 's' : '') + '</div></div>';

    runs.forEach(function(run) {
      var date = new Date(run.date).toLocaleString();
      var mins = Math.floor(run.duration / 60000);
      var secs = Math.floor((run.duration % 60000) / 1000);
      var duration = mins > 0 ? mins + 'm ' + secs + 's' : secs + 's';
      var pct = run.total > 0 ? ((run.passed / run.total) * 100) : 0;
      var fPct = run.total > 0 ? ((run.failed / run.total) * 100) : 0;
      var statusClass = run.status === 'passed' ? 'passed' : 'failed';
      var statusIcon = run.status === 'passed' ? '&#10003;' : '&#10007;';

      html += '<div class="run-card">';
      html += '<div class="run-status-icon ' + statusClass + '">' + statusIcon + '</div>';
      html += '<div class="run-info"><div class="run-date">' + date + '</div><div class="run-id">' + run.id + '</div></div>';
      html += '<div class="run-bar"><div class="run-bar-inner"><div class="run-bar-passed" style="width:' + pct + '%"></div><div class="run-bar-failed" style="width:' + fPct + '%"></div></div></div>';
      html += '<div class="run-stats">';
      html += '<div class="run-stat p"><div class="num">' + run.passed + '</div><div class="lbl">Pass</div></div>';
      html += '<div class="run-stat f"><div class="num">' + run.failed + '</div><div class="lbl">Fail</div></div>';
      html += '<div class="run-stat t"><div class="num">' + run.total + '</div><div class="lbl">Total</div></div>';
      html += '</div>';
      html += '<div class="run-duration">' + duration + '</div>';
      html += '<div class="run-action"><a class="btn-open" href="' + run.reportUrl + '" target="_blank">&#8599; Open</a></div>';
      html += '</div>';
    });

    content.innerHTML = html;
  } catch (err) {
    content.innerHTML = '<div class="empty-state"><div class="es-icon">&#9888;</div><p style="color:#f85149;">Error loading runs: ' + err.message + '</p></div>';
  }
}
</script>

</body>
</html>
